[package]
name = "zarrs_jl"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib"]

[features]
default = ["icechunk"]
icechunk = ["dep:icechunk"]

[dependencies]
zarrs = { version = "0.23", features = ["filesystem"] }
zarrs_storage = { version = "0.4", features = ["async"] }
zarrs_object_store = { version = "0.6", features = ["http"] }
object_store = { version = "0.13", features = ["http"] }
tokio = { version = "1", features = ["rt-multi-thread"] }
icechunk = { version = "0.3", optional = true }
async-trait = "0.1"
futures = "0.3"
once_cell = "1"
serde_json = "1"

[profile.release]
lto = true
